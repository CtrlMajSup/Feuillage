<header class="site-header">
  <div class="header-inner container">
    <a href="{{ '/' | relative_url }}" class="site-logo">
      <span class="logo-icon">⬡</span>
      <span class="logo-text">{{ site.title }}</span>
    </a>

    <nav class="site-nav">
      <a href="{{ '/' | relative_url }}" class="nav-link {% if page.url == '/' %}active{% endif %}">Accueil</a>
      <a href="{{ '/plantes/' | relative_url }}" class="nav-link {% if page.url contains '/plantes' %}active{% endif %}">Encyclopédie</a>
      <a href="{{ '/a-propos/' | relative_url }}" class="nav-link {% if page.url contains '/a-propos' %}active{% endif %}">À propos</a>
    </nav>

    <button class="nav-toggle" aria-label="Menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
  </div>
</header>
